<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prévisualisation — intro d’accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f5f0eb;
      --text-dim: #9a9590;
      --accent: #b8956a;
      --accent-light: #d4aa7d;
      --border: #2a2926;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      /* Échelle typographique harmonisée (une base fluide) */
      --fluid: clamp(0.85rem, 0.55rem + 1.1vw, 1.05rem);
      --t-overline: calc(var(--fluid) * 0.72);
      --t-brand: calc(var(--fluid) * 1.12);
      --t-brand-sub: calc(var(--fluid) * 0.68);
      --t-nav: calc(var(--fluid) * 0.74);
      --t-name-lg: clamp(2.15rem, 1.1rem + 5.2vw, 3.35rem);
      --t-name-md: clamp(1.75rem, 0.95rem + 3.8vw, 2.65rem);
      --t-role: calc(var(--fluid) * 0.82);
      --t-trio: calc(var(--fluid) * 0.78);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: var(--fluid);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .preview-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 0.5rem 0.85rem;
      font-size: var(--t-overline);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(12, 12, 11, 0.94);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem 0.75rem;
    }
    .preview-banner > span {
      text-align: center;
      line-height: 1.35;
      max-width: 52ch;
    }
    .preview-banner code {
      font-size: 0.9em;
      color: var(--accent-light);
      background: rgba(184, 149, 106, 0.12);
      padding: 0.12rem 0.35rem;
      border-radius: 3px;
    }
    .preview-banner .banner-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .preview-banner button {
      font: inherit;
      font-size: var(--t-overline);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 0.38rem 0.75rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s var(--ease-out), transform 0.2s, opacity 0.2s;
    }
    .preview-banner button:hover {
      background: var(--accent-light);
    }
    .preview-banner button:active {
      transform: scale(0.97);
    }
    .preview-banner button.btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .preview-banner button.btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    .preview-banner button.btn-ghost[aria-pressed="true"] {
      color: var(--accent-light);
      border-color: rgba(184, 149, 106, 0.45);
    }

    #intro-root {
      position: fixed;
      inset: 0;
      padding-top: 3.1rem;
    }

    .intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(100% 70% at 50% -10%, rgba(184, 149, 106, 0.06) 0%, transparent 50%),
        radial-gradient(90% 55% at 100% 80%, rgba(184, 149, 106, 0.035) 0%, transparent 45%),
        var(--bg);
      opacity: 0;
      animation: intro-fade-in 1.25s var(--ease-out) 0.1s forwards;
    }

    @keyframes intro-fade-in {
      to { opacity: 1; }
    }

    .intro-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem clamp(1rem, 4vw, 2.25rem);
      min-height: 5.25rem;
      border-bottom: 1px solid transparent;
      animation: top-line 1.15s var(--ease-out) 0.55s forwards;
    }

    @keyframes top-line {
      to { border-bottom-color: rgba(42, 41, 38, 0.88); }
    }

    .intro-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
      opacity: 0;
      transform: translateY(-10px);
      animation: brand-in 1.35s var(--ease-out) 0.45s forwards;
    }

    @keyframes brand-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .intro-brand img {
      height: clamp(2.5rem, 2rem + 2vw, 3.15rem);
      width: auto;
      max-width: 7.5rem;
      object-fit: contain;
      object-position: left center;
      opacity: 0.85;
      flex-shrink: 0;
    }

    .intro-brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 0;
    }

    .intro-brand-name {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700;
      font-size: var(--t-brand);
      letter-spacing: -0.03em;
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .intro-brand-sub {
      font-size: var(--t-brand-sub);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .intro-nav {
      display: none;
      gap: 1.1rem;
      font-size: var(--t-nav);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      animation: nav-in 1.25s var(--ease-out) 0.95s forwards;
    }

    @keyframes nav-in {
      to { opacity: 0.5; }
    }

    @media (min-width: 768px) {
      .intro-nav { display: flex; }
    }

    .intro-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem clamp(1rem, 4vw, 2.5rem) 1.5rem;
      position: relative;
    }

    .intro-hero-cluster {
      position: relative;
      width: 100%;
      max-width: min(32rem, 100%);
      margin-inline: auto;
      isolation: isolate;
      /* Portrait plus modeste */
      --avatar-size: min(14rem, 62vw);
      padding-bottom: 0.5rem;
    }

    .intro-name-block {
      position: relative;
      z-index: 2;
      max-width: 100%;
    }

    .intro-name-layer {
      position: relative;
      z-index: 2;
      padding-top: calc(var(--avatar-size) * 0.34 + clamp(0.2rem, 1.5vw, 0.85rem));
      text-align: center;
    }

    .intro-given,
    .intro-family {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: -0.034em;
      display: block;
    }

    .intro-given {
      font-size: var(--t-name-lg);
      color: var(--text);
      clip-path: inset(0 100% 0 0);
      animation: wipe-in 1.45s var(--ease-out) 1.35s forwards;
      text-shadow:
        0 0 1rem rgba(10, 10, 10, 0.92),
        0 0 2rem rgba(10, 10, 10, 0.65),
        0 2px 3px rgba(10, 10, 10, 0.88);
    }

    .intro-family {
      font-size: var(--t-name-md);
      color: rgba(245, 240, 235, 0.9);
      margin-top: 0.15rem;
      clip-path: inset(0 100% 0 0);
      animation: wipe-in 1.35s var(--ease-out) 2.35s forwards;
      text-shadow:
        0 0 1rem rgba(10, 10, 10, 0.92),
        0 0 2rem rgba(10, 10, 10, 0.65),
        0 2px 3px rgba(10, 10, 10, 0.88);
    }

    @keyframes wipe-in {
      to { clip-path: inset(0 0 0 0); }
    }

    .intro-line {
      position: relative;
      z-index: 2;
      width: 0;
      max-width: 12rem;
      height: 1px;
      margin: 1.15rem auto 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: line-grow 1.1s var(--ease-out) 3.15s forwards;
    }

    @keyframes line-grow {
      to { width: min(70%, 12rem); }
    }

    /* Métiers : défilement lent puis trio final */
    .intro-roles-wrap {
      position: relative;
      z-index: 2;
      margin-top: 1.25rem;
      min-height: 2.85em;
    }

    .intro-roles-cycle {
      position: relative;
      min-height: 1.65em;
      font-size: var(--t-role);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      transition: opacity 0.55s var(--ease-in-out), transform 0.55s var(--ease-out);
    }

    .intro-roles-wrap.is-trio .intro-roles-cycle {
      position: absolute;
      left: 0;
      right: 0;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      visibility: hidden;
    }

    .intro-role {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%) translateY(14px);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.55s var(--ease-in-out), transform 0.65s var(--ease-out);
    }

    .intro-role.is-on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .intro-role.is-off {
      opacity: 0;
      transform: translateX(-50%) translateY(-12px);
    }

    .intro-roles-trio {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem 0.55rem;
      padding: 0.35rem 0;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      visibility: hidden;
      font-size: var(--t-trio);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .intro-roles-wrap.is-trio .intro-roles-trio {
      position: relative;
      visibility: visible;
      pointer-events: auto;
      animation: trio-in 0.85s var(--ease-out) forwards;
    }

    @keyframes trio-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .trio-item {
      color: var(--accent-light);
      padding: 0.2rem 0.45rem;
      border-radius: 2px;
      border: 1px solid rgba(184, 149, 106, 0.22);
      background: rgba(184, 149, 106, 0.06);
      opacity: 0;
      transform: translateY(8px);
    }

    .intro-roles-wrap.is-trio .trio-item {
      animation: trio-chip 0.65s var(--ease-out) forwards;
    }

    .intro-roles-wrap.is-trio .trio-item:nth-child(1) { animation-delay: 0.05s; }
    .intro-roles-wrap.is-trio .trio-item:nth-child(3) { animation-delay: 0.18s; }
    .intro-roles-wrap.is-trio .trio-item:nth-child(5) { animation-delay: 0.31s; }

    @keyframes trio-chip {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .trio-sep {
      color: var(--text-dim);
      opacity: 0.45;
      font-weight: 400;
      user-select: none;
    }

    .intro-avatar-stack {
      position: absolute;
      left: 50%;
      top: clamp(-2.25rem, -5vh, -0.75rem);
      width: var(--avatar-size);
      max-width: 100%;
      transform: translateX(-50%) translateY(-22%);
      z-index: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .intro-avatar-stack__motion {
      opacity: 0;
      transform: translateY(1rem) scale(0.94);
      filter: blur(12px);
    }

    .intro-avatar-stack.intro-avatar-stack--show {
      visibility: visible;
    }

    .intro-avatar-stack.intro-avatar-stack--show .intro-avatar-stack__motion {
      animation: avatar-emerge 1.2s var(--ease-out) forwards;
    }

    @keyframes avatar-emerge {
      0% {
        opacity: 0;
        transform: translateY(1rem) scale(0.94);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .intro-avatar-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      opacity: 0.86;
      box-shadow:
        0 0 0 1px rgba(184, 149, 106, 0.1),
        0 18px 48px rgba(0, 0, 0, 0.55);
    }

    .intro-avatar-frame::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      box-shadow: inset 0 0 0 1px rgba(184, 149, 106, 0.2);
    }

    .intro-avatar-stack--show .intro-avatar-frame::after {
      animation: avatar-ring-fade 1.35s var(--ease-out) 0.15s forwards;
    }

    @keyframes avatar-ring-fade {
      from { opacity: 0; }
      30% { opacity: 1; }
      to { opacity: 0.5; }
    }

    .intro-avatar-inner {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background-color: var(--surface);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center 22%;
      transform: scale(1.02);
      animation: avatar-inner-settle 1.35s var(--ease-out) forwards;
    }

    .intro-avatar-stack:not(.intro-avatar-stack--show) .intro-avatar-inner {
      animation: none;
    }

    @keyframes avatar-inner-settle {
      from {
        transform: scale(1.06);
        opacity: 0.88;
      }
      to {
        transform: scale(1.02);
        opacity: 1;
      }
    }

    .intro.is-exit {
      animation: intro-exit 1.05s var(--ease-in-out) forwards;
    }

    @keyframes intro-exit {
      to {
        opacity: 0;
        transform: scale(1.015);
        filter: blur(10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro,
      .intro-top,
      .intro-brand,
      .intro-nav,
      .intro-given,
      .intro-family,
      .intro-line,
      .intro-avatar-stack,
      .intro-avatar-stack__motion,
      .intro-roles-trio,
      .trio-item {
        animation: none !important;
        clip-path: none !important;
      }
      .intro-line { width: min(70%, 12rem); }
      .intro-avatar-stack {
        visibility: visible;
        transform: translateX(-50%) translateY(-22%);
      }
      .intro-avatar-stack__motion {
        opacity: 1;
        transform: none;
        filter: none;
      }
      .intro-roles-wrap.is-trio .intro-roles-cycle {
        display: none;
      }
      .intro-roles-trio {
        opacity: 1;
        transform: none;
        visibility: visible;
      }
      .trio-item {
        opacity: 1;
        transform: none;
      }
      .intro-nav { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="preview-banner" role="status">
    <span>Prévisualisation — <code>npm run dev</code> puis cette page</span>
    <div class="banner-actions">
      <button type="button" class="btn-ghost" id="btn-sound" aria-pressed="false" title="Active un petit son sur les textes (clic requis par le navigateur)">Son off</button>
      <button type="button" id="btn-skip">Passer</button>
      <button type="button" id="btn-replay">Rejouer</button>
    </div>
  </div>

  <div id="intro-root">
    <div class="intro" id="intro" aria-live="polite">
      <header class="intro-top">
        <div class="intro-brand">
          <img src="/logo/logo-header-bg.png" alt="" width="1024" height="1024" decoding="async" onerror="this.style.display='none'" />
          <div class="intro-brand-text">
            <span class="intro-brand-name">Jonathan Marant</span>
            <span class="intro-brand-sub">Menuiserie · Charpente · Zinguerie</span>
          </div>
        </div>
        <nav class="intro-nav" aria-hidden="true">
          <span>Accueil</span>
          <span>Réalisations</span>
          <span>À propos</span>
          <span>Contact</span>
        </nav>
      </header>

      <div class="intro-stage">
        <div class="intro-hero-cluster">
          <div class="intro-avatar-stack" id="avatar-stack" aria-hidden="true">
            <div class="intro-avatar-stack__motion">
              <div class="intro-avatar-frame">
                <div
                  class="intro-avatar-inner"
                  style="background-image: url('/logo/avatar3.png')"
                  role="img"
                  aria-label="Portrait illustré — Jonathan Marant, artisan"
                ></div>
              </div>
            </div>
          </div>

          <div class="intro-name-block">
            <div class="intro-name-layer">
              <span class="intro-given">Jonathan</span>
              <span class="intro-family">Marant</span>
            </div>
            <div class="intro-line" aria-hidden="true"></div>

            <div class="intro-roles-wrap" id="roles-wrap">
              <div class="intro-roles-cycle" id="roles-cycle" aria-label="Métiers">
                <span class="intro-role" data-i="0">Menuisier</span>
                <span class="intro-role" data-i="1">Charpentier</span>
                <span class="intro-role" data-i="2">Couvreur</span>
              </div>
              <div class="intro-roles-trio" id="roles-trio" aria-hidden="true">
                <span class="trio-item">Menuisier</span>
                <span class="trio-sep" aria-hidden="true">·</span>
                <span class="trio-item">Charpentier</span>
                <span class="trio-sep" aria-hidden="true">·</span>
                <span class="trio-item">Couvreur</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var intro = document.getElementById('intro');
      var rolesCycle = document.getElementById('roles-cycle');
      var rolesWrap = document.getElementById('roles-wrap');
      var rolesTrio = document.getElementById('roles-trio');
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      /** Délais alignés avec les animations CSS (ligne ~3.15s + marge) */
      var ROLE_START_MS = reduced ? 800 : 4500;
      var ROLE_STEP_MS = reduced ? 500 : 1550;
      var HOLD_LAST_ROLE_MS = reduced ? 350 : 950;
      var TRIO_AFTER_MS = reduced ? 200 : 500;
      var AVATAR_AFTER_TRIO_MS = reduced ? 200 : 650;
      var HOLD_FINALE_MS = reduced ? 900 : 3400;
      var EXIT_MS = reduced ? 350 : 1050;

      var timers = [];
      var exitTimer;
      var audioCtx = null;
      var soundEnabled = false;
      var soundBtn = document.getElementById('btn-sound');

      function getRoles() {
        return rolesCycle
          ? Array.prototype.slice.call(rolesCycle.querySelectorAll('.intro-role'))
          : [];
      }

      function setRole(i) {
        var nodes = getRoles();
        nodes.forEach(function (el, j) {
          el.classList.remove('is-on', 'is-off');
          if (j === i) el.classList.add('is-on');
          else if (j < i) el.classList.add('is-off');
        });
        playRolePing(i);
      }

      function ensureAudio() {
        if (!soundEnabled) return null;
        if (!audioCtx) {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          audioCtx = new Ctx();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return audioCtx;
      }

      /** Petit « pep’s » : tonalité légèrement différente par étape */
      function playTone(freq, duration, vol, type) {
        var ctx = ensureAudio();
        if (!ctx) return;
        var t0 = ctx.currentTime;
        var osc = ctx.createOscillator();
        var g = ctx.createGain();
        var filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 180;
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0008, t0 + duration);
        osc.connect(filter);
        filter.connect(g);
        g.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.04);
      }

      function playRolePing(index) {
        if (!soundEnabled) return;
        var base = 520 + index * 95;
        playTone(base, 0.11, 0.055, 'sine');
        window.setTimeout(function () {
          playTone(base + 180, 0.08, 0.035, 'sine');
        }, 70);
      }

      function playTrioChord() {
        if (!soundEnabled) return;
        playTone(392, 0.12, 0.045, 'triangle');
        window.setTimeout(function () {
          playTone(494, 0.1, 0.038, 'triangle');
        }, 90);
        window.setTimeout(function () {
          playTone(587, 0.14, 0.032, 'triangle');
        }, 180);
      }

      function playAvatarShimmer() {
        if (!soundEnabled) return;
        playTone(330, 0.2, 0.04, 'sine');
        window.setTimeout(function () {
          playTone(440, 0.25, 0.028, 'sine');
        }, 120);
      }

      function playLineTick() {
        if (!soundEnabled) return;
        playTone(880, 0.06, 0.03, 'sine');
      }

      function schedule(fn, ms) {
        var id = window.setTimeout(fn, ms);
        timers.push(id);
        return id;
      }

      function clearAllTimers() {
        timers.forEach(function (id) {
          clearTimeout(id);
        });
        timers = [];
        clearTimeout(exitTimer);
      }

      function showTrio() {
        if (!rolesWrap || !rolesTrio) return;
        rolesWrap.classList.add('is-trio');
        rolesTrio.setAttribute('aria-hidden', 'false');
        playTrioChord();
      }

      function showAvatar() {
        var stack = document.getElementById('avatar-stack');
        if (stack) {
          stack.classList.add('intro-avatar-stack--show');
          stack.setAttribute('aria-hidden', 'false');
          playAvatarShimmer();
        }
      }

      function goHome() {
        window.location.href = '/';
      }

      function scheduleExitFrom(msFromNow) {
        clearTimeout(exitTimer);
        exitTimer = window.setTimeout(function () {
          intro.classList.add('is-exit');
          window.setTimeout(goHome, EXIT_MS);
        }, msFromNow);
      }

      /** Séquence métiers puis trio + portrait + sortie */
      function startSequence() {
        clearAllTimers();
        roleIndex = 0;
        if (rolesWrap) rolesWrap.classList.remove('is-trio');
        if (rolesTrio) rolesTrio.setAttribute('aria-hidden', 'true');

        var stack = document.getElementById('avatar-stack');
        if (stack) {
          stack.classList.remove('intro-avatar-stack--show');
          stack.setAttribute('aria-hidden', 'true');
        }

        if (reduced) {
          setRole(2);
          showTrio();
          showAvatar();
          scheduleExitFrom(HOLD_FINALE_MS);
          return;
        }

        getRoles().forEach(function (el) {
          el.classList.remove('is-on', 'is-off');
        });

        schedule(function () {
          playLineTick();
        }, 3150);

        schedule(function () {
          playTone(523, 0.1, 0.03, 'sine');
        }, 1380);
        schedule(function () {
          playTone(659, 0.1, 0.026, 'sine');
        }, 2380);

        schedule(function () {
          setRole(0);
        }, ROLE_START_MS);

        schedule(function () {
          setRole(1);
        }, ROLE_START_MS + ROLE_STEP_MS);

        schedule(function () {
          setRole(2);
        }, ROLE_START_MS + 2 * ROLE_STEP_MS);

        /** Dernier métier affiché puis courte pose, ensuite les 3 ensemble */
        var trioAt =
          ROLE_START_MS +
          2 * ROLE_STEP_MS +
          HOLD_LAST_ROLE_MS +
          TRIO_AFTER_MS;

        schedule(function () {
          showTrio();
        }, trioAt);

        schedule(function () {
          showAvatar();
        }, trioAt + AVATAR_AFTER_TRIO_MS);

        var total = trioAt + AVATAR_AFTER_TRIO_MS + HOLD_FINALE_MS;
        scheduleExitFrom(total);
      }

      function replay() {
        intro.classList.remove('is-exit');
        clearAllTimers();
        var parent = intro.parentNode;
        var clone = intro.cloneNode(true);
        parent.replaceChild(clone, intro);
        intro = document.getElementById('intro');
        rolesCycle = document.getElementById('roles-cycle');
        rolesWrap = document.getElementById('roles-wrap');
        rolesTrio = document.getElementById('roles-trio');
        startSequence();
      }

      soundBtn.addEventListener('click', function () {
        soundEnabled = !soundEnabled;
        soundBtn.setAttribute('aria-pressed', soundEnabled ? 'true' : 'false');
        soundBtn.textContent = soundEnabled ? 'Son on' : 'Son off';
        if (soundEnabled) {
          ensureAudio();
          playTone(660, 0.08, 0.05, 'sine');
        }
      });

      document.addEventListener(
        'pointerdown',
        function onceUnlock() {
          if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
        },
        { passive: true }
      );

      startSequence();

      document.getElementById('btn-skip').addEventListener('click', function () {
        clearAllTimers();
        goHome();
      });

      document.getElementById('btn-replay').addEventListener('click', replay);
    })();
  </script>
</body>
</html>
